name: SonarQube Cloud

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-and-analyze:
    name: Build, test, coverage and SonarQube analysis
    runs-on: ubuntu-24.04

    env:
      PIP_BREAK_SYSTEM_PACKAGES: 1

    steps:
      - name: Set up OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build ruby build-essential \
            libssl-dev libjansson-dev \
            xmlstarlet \
            python3 python3-pip python3-wheel

          pip3 install gcovr

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build dependencies
        run: ./build.sh deps

      - name: Configure BSL with unit tests, coverage and compile commands
        run: >
          ./build.sh prep
          -DBUILD_DOCS_API=OFF
          -DBUILD_DOCS_MAN=OFF
          -DBUILD_UNITTEST=ON
          -DTEST_MEMCHECK=OFF
          -DBUILD_COVERAGE=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build BSL
        run: ./build.sh

      - name: Install BSL
        run: ./build.sh install

      - name: Run unit tests
        run: ./build.sh check

      - name: Run Mock BPA tests
        run: |
          pip3 install --upgrade pip
          pip3 install -r mock-bpa-test/requirements.txt
          python3 -m pytest mock-bpa-test

      - name: Generate SonarQube coverage report
        run: |
          ./build.sh --target coverage-sonarqube -v

          test -s build/default/compile_commands.json
          test -s build/default/coverage-sonarqube.xml

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build/default/compile_commands.json
            --define sonar.coverageReportPaths=build/default/coverage-sonarqube.xml